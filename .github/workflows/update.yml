name: Update Potato Data

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          pip install pandas requests numpy

      - name: Update Garak
        run: python modules/garak.py

      - name: Update Weather
        run: python modules/weather.py

      - name: Update KAMIS
        run: python modules/kamis.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/*.csv

          git diff --staged --quiet || git commit -m "Auto update data"

          git push